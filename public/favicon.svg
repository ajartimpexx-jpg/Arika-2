<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <rect width="100" height="100" fill="#1a1a1a"/>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="46" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="41" stroke="#C9A84C" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Dashed circle -->
  <circle cx="50" cy="50" r="23" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="2 3" fill="none" opacity="0.3"/>
  <!-- 8-pointed star: two overlapping squares -->
  <!-- Square 1 (axis-aligned diamond) -->
  <polygon points="50,14 86,50 50,86 14,50" fill="#C9A84C" opacity="0.25"/>
  <polygon points="50,14 86,50 50,86 14,50" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
  <!-- Square 2 (45-degree rotated) -->
  <polygon points="75.46,24.54 75.46,75.46 24.54,75.46 24.54,24.54" fill="#C9A84C" opacity="0.18"/>
  <polygon points="75.46,24.54 75.46,75.46 24.54,75.46 24.54,24.54" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
  <!-- Cardinal triangles / arrowheads -->
  <polygon points="47,8 53,8 50,3" fill="#C9A84C" opacity="0.75"/>
  <polygon points="92,47 92,53 97,50" fill="#C9A84C" opacity="0.75"/>
  <polygon points="47,92 53,92 50,97" fill="#C9A84C" opacity="0.75"/>
  <polygon points="8,47 8,53 3,50" fill="#C9A84C" opacity="0.75"/>
  <!-- Diagonal accent circles -->
  <circle cx="79" cy="21" r="2.2" fill="#C9A84C" opacity="0.6"/>
  <circle cx="79" cy="79" r="2.2" fill="#C9A84C" opacity="0.6"/>
  <circle cx="21" cy="79" r="2.2" fill="#C9A84C" opacity="0.6"/>
  <circle cx="21" cy="21" r="2.2" fill="#C9A84C" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#C9A84C" opacity="0.9"/>
  <circle cx="50" cy="50" r="2" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
</svg>
